<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }
        h1{
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            text-decoration: underline;
            font-family: 'Times New Roman', Times, serif;
        }
        .Box{
            width: 300px;
            height: 150px;
            margin: 20px auto;
            transition: background-color 0.3s ease;
        }
        .Box1{
            background-color: lightblue; 
            border: 3px solid blue;
            padding: 20px;
        }
        .Box1:hover{
            background-color: deepskyblue;
        }
        .Box2{
            background-color: lightgreen;
            border: 4px dashed green;
            padding: 15px;
        }
        .Box2:hover{
            background-color: rgb(150, 209, 187);
        }
        .Box3{
            background-color: lightyellow;
            border: 5px dotted orange;
            border-radius: 15px;
            padding: 20px;
        }
        .Box3:hover{
            background-color: gold;
        }
    </style>
</head>
<body>
    <h1>Education and Technology ⭐</h1>
    <div class="Box Box1">
        <p>Education helps people develop knowledge, skills, and confidence.</p>
    </div>

    <div class="Box Box2">
        <p>Learning new technologies opens the door to exciting career opportunities.</p>
    </div>

    <div class="Box Box3">
        <p>Practice and consistency are the keys to becoming a successful programmer.</p>
    </div>
</body>
</html>
